name: DevOps CI/CD Pipeline - AWS Fargate

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: subcripciones-repo
  ECS_SERVICE: subcripciones-service
  ECS_CLUSTER: devops-cluster
  ECS_TASK_DEFINITION: .aws/task-definition.json

jobs:
  Quality-and-CI:
    name: Integración Continua & Quality Gates (IE5)
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Clonar Código Fuente
        uses: actions/checkout@v4

      - name: Configurar Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # ---------- POLITICA DE INTERRUPCIÓN (IE5) ----------
      - name: Ejecutar Pruebas Unitarias y Cobertura
        run: mvn clean test

      - name: Verificar Empaquetado JAR
        run: mvn package -DskipTests

      - name: Configurar Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Autenticar en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Construir y Subir Imagen Docker a ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  CD-and-Deployment:
    name: Despliegue Continuo con Circuit Breaker (IE6)
    needs: Quality-and-CI
    runs-on: ubuntu-latest

    steps:
      - name: Clonar Código Fuente
        uses: actions/checkout@v4

      - name: Configurar Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Actualizar Definición de Tarea de ECS con Nueva Imagen
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: subcripciones-container
          image: ${{ needs.Quality-and-CI.outputs.image }}

      # ---------- POLITICA DE DESPLIEGUE SEGURO (IE6) ----------
      - name: Desplegar en Amazon ECS (Fargate)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true